[build]
  command = "npm run build"

[build.environment]
  # Node 22: firebase-admin >=14 and @netlify/plugin-nextjs require it.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Static files from /public are served by Netlify's CDN (not Next headers()).
# Keep HTML/API no-store via next.config; cache versioned media aggressively.
[[headers]]
  for = "/events/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/venues/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/cities/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/categories/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/app-version.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

# Scheduled functions run automatically on production deploys
# - scheduled-cleanup.mts: Daily at midnight UTC (@daily)
# - scheduled-notify.mts: Fridays at 9:00 AM UTC (0 9 * * 5)

# Environment variables to set in Site settings → Environment variables:
# Required for Firebase:
#   FIREBASE_SERVICE_ACCOUNT_JSON (or FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL, FIREBASE_PRIVATE_KEY)
# Optional for enhanced features:
#   BRAVE_SEARCH_API_KEY, OPENAI_API_KEY, OPENAI_MODEL
# Optional for push notifications:
#   NEXT_PUBLIC_VAPID_PUBLIC_KEY, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT
# Optional for manual cron endpoints:
#   CRON_SECRET (for /api/cron/cleanup, /api/cron/notify, /api/cron/partner-digest)
