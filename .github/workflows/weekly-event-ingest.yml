name: Weekly event ingest

on:
  schedule:
    # Sundays 16:00 UTC (~12:00 AST) — review at /en/moderate
    - cron: "0 16 * * 0"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Sync curated seeds, Facebook seeds, and queue crawled events
        env:
          SITE_URL: https://pop-event.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set — add it in repo Settings → Secrets."
            exit 1
          fi
          post_api() {
            local path="$1"
            local label="$2"
            local attempts="${3:-1}"
            # soft=1 → warn on failure instead of failing the job (seeds already published).
            local soft="${4:-0}"
            local res http body url try=1
            if [[ "$path" == *\?* ]]; then
              url="${SITE_URL}${path}&secret=${CRON_SECRET}"
            else
              url="${SITE_URL}${path}?secret=${CRON_SECRET}"
            fi
            while true; do
              # Netlify gateway ~26–30s inactivity; fail the attempt before hanging forever.
              res=$(curl -sS --max-time 90 -w "\n%{http_code}" -X POST "$url" || true)
              http=$(echo "$res" | tail -n1)
              body=$(echo "$res" | sed '$d')
              echo "${label}: HTTP ${http} (attempt ${try}/${attempts})"
              echo "$body"
              if [ "$http" -ge 200 ] && [ "$http" -lt 300 ] 2>/dev/null; then
                # Seeds return success:true; some cron routes historically used ok:true.
                if echo "$body" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true|"ok"[[:space:]]*:[[:space:]]*true'; then
                  return 0
                fi
                echo "${label}: HTTP ${http} but no success/ok true in body — treating as failure."
              fi
              if [ "$http" = "401" ]; then
                echo "::error::Unauthorized — set CRON_SECRET on Netlify to match GitHub repo secret, then redeploy."
                exit 22
              fi
              if [ "$try" -ge "$attempts" ]; then
                if [ "$soft" = "1" ]; then
                  echo "::warning::${label} failed after ${attempts} attempt(s) — continuing (seeds already synced)."
                  return 1
                fi
                echo "::error::${label} failed after ${attempts} attempt(s)."
                exit 22
              fi
              try=$((try + 1))
              echo "Retrying ${label} in 20s…"
              sleep 20
            done
          }
          # Opinions + images run after fast ingest (Netlify ~26–30s gateway).
          post_api "/api/seed/curated-events" "curated seed"
          post_api "/api/seed/facebook-events?opinions=0" "facebook seed"
          # Crawl ingest often races Netlify's idle gateway — soft-fail so seed success still greens.
          post_api "/api/ingest?opinions=0&fast=1" "ingest" 4 1 || true
          # Source images + venues + draft opinions for pending AND approved gaps.
          post_api "/api/cron/ingest-enrich?limit=8&opinionLimit=5" "ingest enrich" 3 1 || true
          # Also top up recurring-series opinion drafts that still lack seed copy.
          post_api "/api/cron/event-opinion-drafts?generate=1&limit=5" "opinion drafts" 3 1 || true
