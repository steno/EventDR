name: Weekly event ingest

on:
  schedule:
    # Sundays 16:00 UTC (~12:00 AST) — review at /en/moderate
    - cron: "0 16 * * 0"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Queue crawled and social events for moderation
        env:
          SITE_URL: https://popevent.netlify.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set — add it in repo Settings → Secrets."
            exit 1
          fi
          curl -sf -X POST "${SITE_URL}/api/ingest?secret=${CRON_SECRET}&locale=en"
          curl -sf -X POST "${SITE_URL}/api/ingest?secret=${CRON_SECRET}&locale=es"
