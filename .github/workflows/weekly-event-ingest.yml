name: Weekly event ingest

on:
  schedule:
    # Sundays 16:00 UTC (~12:00 AST) — review at /en/moderate
    - cron: "0 16 * * 0"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Queue crawled and social events for moderation
        env:
          SITE_URL: https://pop-events.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set — add it in repo Settings → Secrets."
            exit 1
          fi
          ingest() {
            local res http
            res=$(curl -sS -w "\n%{http_code}" -X POST \
              "${SITE_URL}/api/ingest?secret=${CRON_SECRET}&locale=en")
            http=$(echo "$res" | tail -n1)
            body=$(echo "$res" | sed '$d')
            echo "ingest: HTTP ${http}"
            echo "$body"
            if [ "$http" -lt 200 ] || [ "$http" -ge 300 ]; then
              if [ "$http" = "401" ]; then
                echo "::error::Unauthorized — set CRON_SECRET on Netlify to match GitHub repo secret, then redeploy."
              fi
              exit 22
            fi
          }
          ingest
