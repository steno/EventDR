<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <!-- Deploy-time detection only — submissions POST here from the React UI. -->
    <form
      name="events-mailbox"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="events-mailbox" />
      <input name="bot-field" />
      <input name="email" type="email" />
      <input name="locale" type="text" />
    </form>
  </body>
</html>
